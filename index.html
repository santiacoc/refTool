<!DOCTYPE html>
<html>

<head>
  <title>refTool</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
  <h1 class="text-center">refTool</h1>



<div id="viewer" class="d-flex justify-content-center align-items-center" style="height: 80vh;">
  <img id="imageViewer" class="img-fluid d-block mx-auto" 
        style="max-height: 70vh; max-width: 100vw; transition: opacity 0.5s ease-in-out">
</div>

<style>
#imageViewer {
    transition: opacity 1s ease-in-out;
    opacity: 1;
    max-height: 80vh;
    max-width: 90vw;
    object-fit: contain;
}

#imageViewer.fade-out {
    opacity: 0;
}
</style>

  <div class="fixed-bottom mb-5 footer">
    <div id="buttons" class="d-flex flex-wrap justify-content-center">
      <button id="prevBtn">Previous</button>
      <button id="randomBtn">Random</button>
      <!-- folder buttons go here -->
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/js.js"></script>

</body>

</html>
